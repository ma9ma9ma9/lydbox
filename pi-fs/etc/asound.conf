pcm.!default {
    type plug
    slave.pcm "softvol"
}

pcm.softvol {
    type softvol
    slave.pcm "dmixed"
    control {
        name "Master"
        card 1
    }
    min_dB -51.0
    max_dB 0.0
    resolution 100
}

pcm.dmixed {
    type dmix
    ipc_key 1024
    ipc_perm 0660
    slave {
        pcm "hw:1,0"
        rate 48000
        channels 2
        format S16_LE
        period_size 1024
        buffer_size 8192
    }
}

ctl.!default {
    type hw
    card 1
}
